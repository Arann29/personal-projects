services:
  api:
    build: .
    container_name: finance_control_api
    env_file:
      - .env.example
    ports:
      - "8005:8000"
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build: .
    container_name: finance_control_dashboard
    env_file:
      - .env.example
    ports:
      - "8505:8501"
    depends_on:
      - api
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
